version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: always
    profiles:
      - mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-blog}
      MYSQL_USER: ${MYSQL_USER:-bloguser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blogpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PostgreSQL Database
  postgresql:
    image: postgres:15-alpine
    container_name: blog-postgresql
    restart: always
    profiles:
      - postgresql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blog}
      POSTGRES_USER: ${POSTGRES_USER:-bloguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blogpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./docker/postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-bloguser}"]
      timeout: 20s
      retries: 10

  # SQLite (No service needed - file-based database)
  # SQLite uses file:./blog.db DATABASE_URL, no container required

  # Next.js Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_PROVIDER: ${DB_PROVIDER:-mysql}
      # MySQL DATABASE_URL
      DATABASE_URL: ${DATABASE_URL:-mysql://${MYSQL_USER:-bloguser}:${MYSQL_PASSWORD:-blogpassword}@mysql:3306/${MYSQL_DATABASE:-blog}}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-secret-key-change-in-production}
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-My Blog}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY}
      WECHAT_PAY_APP_ID: ${WECHAT_PAY_APP_ID}
      WECHAT_PAY_MCH_ID: ${WECHAT_PAY_MCH_ID}
      WECHAT_PAY_API_KEY: ${WECHAT_PAY_API_KEY}
    # Note: When using profiles, start databases manually:
    #   docker-compose --profile mysql up -d mysql
    #   docker-compose --profile postgresql up -d postgresql
    networks:
      - blog-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: blog-nginx
    restart: always
    profiles:
      - nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web
    networks:
      - blog-network

volumes:
  mysql_data:
  postgresql_data:

networks:
  blog-network:
    driver: bridge
